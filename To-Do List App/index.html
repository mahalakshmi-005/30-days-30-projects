<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <h1> Smart Todo</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="handleKey(event)">
            <button onclick="addTask()">Add</button>
        </div>

        <div class="filters">
            <button onclick="showAll()">All</button>
            <button onclick="showPending()">Pending</button>
            <button onclick="showCompleted()">Completed</button>
        </div>

        <p id="taskCount"></p>

        <ul id="taskList"></ul>

        <button class="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
